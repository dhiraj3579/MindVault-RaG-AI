<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindVault AI</title>
    <style>
      #loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: white;
        color: black;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #eee;
        border-radius: 50%;
        border-top-color: #6366f1;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #error-display {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: #fee2e2;
        color: #991b1b;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid #f87171;
        font-family: monospace;
        font-size: 13px;
        white-space: pre-wrap;
        z-index: 9999;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #ffffff !important; color: #000000 !important;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
        <h1 style="margin: 0; color: #6366f1;">MindVault is Loading...</h1>
        <p id="diag-msg" style="color: #666;">If you see this white screen, the HTML is working.</p>
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <div id="error-display" style="display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; background: #fee2e2; color: #991b1b; padding: 20px; border-radius: 12px; border: 2px solid #f87171; font-family: monospace; z-index: 99999;"></div>
    <script>
      console.log('MindVault: HTML Diagnostic Script Running');
      window.onerror = function(msg, url, line, col, error) {
        var display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = '<strong>CRITICAL ERROR:</strong><br>' + msg + '<br><br>File: ' + url + '<br>Line: ' + line;
      };
      setTimeout(function() {
        if (!window.__APP_INITIALIZED__) {
          document.getElementById('diag-msg').innerHTML = '<strong>STUCK:</strong> The JavaScript bundle failed to start. Check browser console (F12).';
          document.getElementById('diag-msg').style.color = 'red';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
