<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindVault AI | Personal Knowledge Vault</title>
    <meta name="description" content="Securely chat with your documents using private RAG technology." />
    <!-- VERSION: 1.0.5-FINAL -->
    <style>
      body {
        margin: 0;
        background-color: #f9fafb;
        font-family: 'Inter', -apple-system, sans-serif;
      }
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #09090b;
        color: white;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <div class="spinner"></div>
      <div style="font-weight: 500; letter-spacing: -0.01em;">MindVault AI</div>
      <div style="font-size: 10px; color: #71717a; margin-top: 8px;">Preparing your vault...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Automatically hide loader when React is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('root-loader');
          if (loader) loader.style.opacity = '0';
          setTimeout(() => loader?.remove(), 500);
        }, 800);
      });
    </script>
  </body>
</html>
